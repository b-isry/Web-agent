<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mozilla UWA - Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>Mozilla UWA Settings</h1>

    <section>
      <h2>LLM Provider</h2>
      <div class="field">
        <label for="provider">Provider</label>
        <select id="provider">
          <option value="openai">OpenAI (GPT)</option>
          <option value="anthropic">Anthropic (Claude)</option>
        </select>
      </div>

      <div class="field">
        <label for="apiKey">API Key</label>
        <input type="password" id="apiKey" placeholder="sk-... or sk-ant-..." autocomplete="off">
        <small>Stored locally in your browser. Never sent to third parties except the chosen provider.</small>
      </div>

      <div class="field">
        <label for="model">Model</label>
        <input type="text" id="model" placeholder="gpt-4o-mini or claude-3-5-sonnet-20241022">
      </div>
    </section>

    <section>
      <h2>User Preferences</h2>
      <p>These preferences can be read by the agent via the "Read User Preferences" tool.</p>
      <div class="field">
        <label for="theme">Theme</label>
        <select id="theme">
          <option value="system">System</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>
      <div class="field">
        <label>
          <input type="checkbox" id="notifications" checked>
          Enable notifications
        </label>
      </div>
      <div class="field">
        <label for="language">Language</label>
        <input type="text" id="language" value="en" placeholder="en">
      </div>
    </section>

    <div class="actions">
      <button id="save" type="button">Save</button>
      <span id="status" class="status"></span>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
