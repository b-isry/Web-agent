<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mozilla UWA - Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>Mozilla UWA Settings</h1>

    <section>
      <h2>LLM Provider</h2>
      <div class="field">
        <label for="provider">Provider</label>
        <select id="provider">
          <option value="openai">OpenAI (GPT)</option>
          <option value="anthropic">Anthropic (Claude)</option>
          <option value="groq">Groq (Llama, Mixtral)</option>
        </select>
      </div>

      <div class="field">
        <label for="apiKey">API Key</label>
        <input type="password" id="apiKey" placeholder="sk-... or sk-ant-..." autocomplete="off">
        <small>Stored locally in your browser. Never sent to third parties except the chosen provider.</small>
      </div>

      <div class="field">
        <label for="model">Model</label>
        <select id="model">
          <option value="gpt-4o">gpt-4o</option>
          <option value="gpt-4o-mini">gpt-4o-mini</option>
          <option value="claude-3-5-sonnet">claude-3-5-sonnet</option>
          <option value="llama-3-70b">llama-3-70b</option>
        </select>
      </div>
    </section>

    <section>
      <h2>User Preferences</h2>
      <p>These preferences can be read by the agent via the "Read User Preferences" tool.</p>
      <div class="field">
        <label for="theme">Theme</label>
        <div class="theme-row">
          <select id="theme">
            <option value="system">System</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
          <button id="toggle-theme" type="button">Toggle Theme</button>
        </div>
      </div>
      <div class="field">
        <label>
          <input type="checkbox" id="notifications" checked>
          Enable notifications
        </label>
      </div>
      <div class="field">
        <label for="language">Language</label>
        <select id="language">
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
        </select>
      </div>
      <div class="field">
        <label for="monthly_budget">Monthly Budget ($)</label>
        <input type="number" id="monthly_budget" min="0" step="0.01" placeholder="e.g. 2000">
        <small>Used by the agent to check affordability. Stored locally.</small>
      </div>
    </section>

    <div class="actions">
      <button id="save" type="button">Save</button>
      <span id="status" class="status"></span>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
